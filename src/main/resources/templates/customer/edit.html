<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: 700; }
        .page-header { background: linear-gradient(135deg, #198754, #20c997); color: white; padding: 2rem 0; margin-bottom: 2rem; }
        .card { border: none; box-shadow: 0 2px 15px rgba(0,0,0,0.08); border-radius: 14px; }
        .form-label { font-weight: 600; color: #495057; }
        .form-control, .form-select { border-radius: 8px; padding: 10px 14px; }
        .form-control:focus, .form-select:focus { border-color: #0d6efd; box-shadow: 0 0 0 0.2rem rgba(13,110,253,0.15); }
        .btn-lg { border-radius: 10px; padding: 12px 30px; }
        .required-star { color: #dc3545; }
        .section-title { font-size: 0.875rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1px; color: #6c757d; border-bottom: 2px solid #e9ecef;
            padding-bottom: 8px; margin-bottom: 1.2rem; }
    </style>
</head>
<body>
<!--네비게이션-->
<nav class="navbar navbar-expand-lg naver-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <i class="bi bi-people-fill me-2"></i>고객 관리 시스템
        </a>
        <div class="ms-auto">
            <a id="dataLink" href="#" class="btn btn-light btn-sm me-2">
                <i class="bi bi-arrow-left me-1"></i>상세 보기
            </a>
            <a class="btn btn-light btn-sm" th:href="@{/}">
                <i class="bi bi-list-ul me-1"></i>목록으로
            </a>
        </div>
    </div>
</nav>
<!--헤더부분-->
<div class="page-header">
    <div class="container d-flex align-items-conter justify-contetn-between">
        <h2 class="mb-1">
            <i class="bi bi-person-plus-fill me-2"></i>고객 정보 수정
        </h2>
        <p class="mb-0 opacity-75">
            고객 번호 : <strong id="headerCid"></strong>
        </p>
        <span class="edit-badge">
            <i class="bi bi-pencil me-1"></i>편집 모드
        </span>
    </div>
</div>
<!--입력폼-->
<div class="container mb-5">
    <div class="row justify-content-center"> <!--justify-content-center사용하면 12칸 안맞춰도 된다.-->
        <div class="col-lg-8">
            <div class="card p-4">
                <div class="card-body">
                    <div id="registerForm"><!--Controller방식 form사용, RestController방식 div-->
                        <div class="section-title">
                            <i class="bi bi-person me-1"></i>기본 정보
                        </div>
                        <div class="row g-3 mb-4"><!--name은 form이 사용, 스크립트는 id명와 class명 사용-->
                            <div cols="col-md-6">
                                <label class="form-label">고객명<span class="required-star">*</span></label>
                                <input class="form-control" type="text" id="name" placeholder="고객 이름을 입력하세요.">
                            </div>
                            <div cols="col-md-6">
                                <label class="form-label">이메일</label>
                                <input class="form-control" type="email" id="email" placeholder="example@email.com">
                            </div>
                            <div cols="col-md-6">
                                <label class="form-label">연락처</label>
                                <input class="form-control" type="text" id="phone" placeholder="010-0000-0000">
                            </div>
                            <div cols="col-md-6">
                                <label class="form-label">등급</label>
                                <select id="grade" class="form-select">
                                    <option value="NORMAL">일반</option>
                                    <option value="SILVER">실버</option>
                                    <option value="GOLD">골드</option>
                                    <option value="VIP">VIP</option>
                                </select>
                            </div>
                        </div>
                        <div class="section-title">
                            <i class="bi bi-building me-1"></i>회사 정보
                        </div>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label">회사명</label>
                                <input type="text" id="company" class="form-control" placeholder="회사명을 입력하세요.">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">주소</label>
                                <input type="text" class="form-control" id="address" placeholder="주소를 입력하세요.">
                            </div>
                        </div>
                        <div class="section-title">
                            <i class="bi bi-building me-1"></i>메모
                        </div>
                        <div class="mb-4">
                            <textarea id="memo" class="form-control" rows="4" placeholder="특이사항이나 메모를 입력하세요.">
                            </textarea>
                        </div>
                        <div class="d-flex gap-3 justify-content-end">
                            <!--a태그는 href 생략불가능, 사용 안할 때는 href='#'-->
                            <a id="cancelBtn" th:href="@{/}" class="btn btn-outline-secondary btn-lg">
                                <i class="bi bi-x-circle me-1"></i>취소
                            </a>
                            <button type="button" class="btn btn-warning btn-lg" id="resetBtn">
                                <i class="bi bi-arrow-counterclickwise me-1"></i>초기화
                            </button>
                            <button type="button" class="btn btn-success btn-lg" id="saveBtn">
                                <i class="bi bi-check-circle me-1"></i>수정
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script th:inline="javascript">
    //Controller에서 전달된 변수를 스크립트에서 받아서 사용하려면
    const cid = /*[[${customer.cid}]]*/ null;
    let originalData = {};

    //수정폼에 데이터값을 출력(초기값)
    function loadCustomer(){
        $.ajax({
            url : '/api/customers/'+cid, //개별조회 요청
            method: 'GET',
            success: function(c){
                originalData = c; //읽어온 dto값을 저장
                $('#headerCid').text(c.cid);
                $('#datailLink').attr('href', '/customer/detail/'+c.cid);
                $('#cancelBtn').attr('href', '/customer/detail/'+c.cid);
                $('#name').val(c.name ||'');
                $('#email').val(c.email||'');
                $('#phone').val(c.phone||'');
                $('#grade').val(c.grade||'NORMAL');
                $('#compnay').val(c.company||'');
                $('#address').val(c.address||'');
                $('#memo').val(c.memo||'');
            },
            error: function(){
                alert('고객 정보를 불러올 수 없습니다.');
                location.href='/';
             }
        });
    }

    //전화번호 자동 변환
    $('#phone').on('input', function(){ //phone태그에서 입력이 발생하면
        //this(현재태그,#phone) /\D 숫자아닌 문자, g 전체입력된 내용중에서
        //숫자가 아닌 문자는 ''빈값으로 바꾼다.(replace)
        let val = $(this).val().replace(/\D/g, '');
        if(val.length<=3) $(this).val(val); //숫자가 3자리 이하면 그냥 출력
        //숫자가 7자리이면 slice(자르기) 0~3전까지 0
        else if(val.length<=7) $(this).val(val.slice(0,3)+'-'+val.slice(3));
        else $(this).val(val.slice(0,3)+'-'+val.slice(3,7)+'-'+val.slice(7,11));
    });
    //초기화 버튼 클릭시
    $('#resetBtn').on('click', function(){
        $('#name').val(originalData.name ||'');
        $('#email').val(originalData.email||'');
        $('#phone').val(originalData.phone||'');
        $('#grade').val(originalData.grade||'NORMAL');
        $('#compnay').val(originalData.company||'');
        $('#address').val(originalData.address||'');
        $('#memo').val(originalData.memo||'');
    });

    //수정버튼을 클릭시 저장 요청
    $('#saveBtn').on('click', function(){
        const name = $('#name').val().trim(); //좌우 빈공백을 제거
        if(!name) {
            alert('고객명은 필 수 입력 항목입니다.');
            $('#name').focus(); //커서를 해당태그에 위치(이동)시킨다.
            return;
        }

        if(!confirm('고객 정보를 수정하시겠습니까?')) return;

        //Form(자동)사용과 Div(수동)사용시 데이터저장 형태가 틀린다.
        const data = {
          name : name,
          email : $('#email').val().trim(),
          phone : $('#phone').val().trim(),
          grade : $('#grade').val().trim(),
          company : $('#company').val().trim(),
          address : $('#address').val().trim(),
          memo : $('#memo').val().trim(),
          regDate: originalData.regDate
        };

        $.ajax({ //등록요청
            url: '/api/customers/'+cid,
            method: 'PUT',
            contentType: 'application/json', //form과 div인 경우 변화
            data : JSON.stringify(data),     //form과 div인 경우 변화

            success:function (msg){
                alert(msg);
                location.href="/customer/detail/"+cid;
            },
            error:function(xhr){
                alert('수정 실패:'+(xhr.responseText || '수정시 오류가 발생하였습니다.'));
            }
        });
    });

    loadCustomer();
</script>
</body>
</html>
